<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Super outil de messagerie</title>
  <link href="style.css" rel="stylesheet">
</head>

<body>

  <header>
    <h1>Super outil de messagerie</h1>
  </header>

  <section>
    <h2>Messages</h2>
    <ul id="messages"></ul>
    <button id="refresh">Rafraîchir</button>
  </section>

  <section>
    <h2>Poster un message</h2>
    <input type="text" id="pseudo" placeholder="Votre pseudo ici">
    
    <br><br>

    <label for="message"> Message :</label>
    <br>
    <textarea id="message" rows="4" cols="50" placeholder="Votre message ici"></textarea>
    <br>
    <button id="send">Envoyer</button>
  </section>

  <section>
    <h2>Style</h2>
    <button id="Bravo_six_going_dark">Passer en mode sombre</button>
  </section>
  
<script src="script.js"></script>

</body>

</html>
